services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fbr_design
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fbr_design
    ports:
      - "8541:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      FBR_DESIGN_API_URL: http://backend:8000
    ports:
      - "3541:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
